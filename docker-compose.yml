services:
  # 1. Database (Existing)
  db:
    image: mysql:8.0
    container_name: riskpulse_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:6
    container_name: riskpulse_redis
    ports:
      - "6379:6379"

  # 3. Backend (Django) - UPDATED
  backend:
    build: ./backend
    container_name: riskpulse_be

    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_HOST=db
      - MYSQL_PORT=3306

      - DEBUG=${DEBUG}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}

    # Dev
    command: python manage.py runserver 0.0.0.0:8000

    # For Deployment
    # command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3

